name: GitHub-Profile-Summary-Cards

on:
  schedule: # execute every 6 hours (00:00, 06:00, 12:00, 18:00 KST)
    - cron: "0 15,21,3,9 * * *"  # 00:00, 06:00, 12:00, 18:00 KST (UTC+9)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Step 1: Generate our custom 4-quadrant profile card FIRST.
      # The vn7n24fzkq action below fires enough GraphQL queries to exhaust
      # the token's hourly quota; when the custom card ran after it, its
      # queries hit 403 rate-limit every run (2026-07-18 incident: card
      # dropped 6,913 → 253). Running first guarantees a fresh quota.
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Generate custom 4-quadrant profile card
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_CARDS_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
        run: |
          python dashboard/generate_profile_card.py

      # The vn7n24fzkq action writes its own standard card to the SAME path
      # (default/0-profile-details.svg). Save ours now and restore it after
      # the action, so the custom 4-quadrant card is what gets committed.
      # On a rate-limited run the script above kept the previous custom card,
      # so this save/restore also protects that keep-previous behavior.
      - name: Save custom card before summary-cards action
        run: cp profile-summary-card-output/default/0-profile-details.svg /tmp/custom-card.svg

      # Step 2: Generate original profile summary cards (verified solution with accurate data)
      - name: Generate GitHub Profile Summary Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.SUMMARY_CARDS_TOKEN }}
          COMMIT_MESSAGE: ''
        with:
          USERNAME: ${{ github.repository_owner }}
          UTC_OFFSET: 9

      - name: Restore custom card over the action's standard card
        run: cp /tmp/custom-card.svg profile-summary-card-output/default/0-profile-details.svg

      # Step 3: Commit both cards
      - name: Commit and push if changed
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add profile-summary-card-output/ README.md dashboard/.stats_cache.json
          if ! git diff --staged --quiet; then
            git commit -m "update: automated profile cards generation (original + custom 4-quadrant)"
            git pull --rebase
            git push
          else
            echo "No changes to commit"
          fi